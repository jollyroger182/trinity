services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: trinity-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://trinity_user:trinity_password@db:5432/trinity
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - trinity-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const res = await fetch('http://localhost:3000').catch(() => ({ok: false})); process.exit(res.ok ? 0 : 1)",
          "||",
          "true",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16-alpine
    container_name: trinity-db
    environment:
      - POSTGRES_USER=trinity_user
      - POSTGRES_PASSWORD=trinity_password
      - POSTGRES_DB=trinity
    volumes:
      - trinity-db-data:/var/lib/postgresql/data
    networks:
      - trinity-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trinity_user -d trinity"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  trinity-network:
    driver: bridge

volumes:
  trinity-db-data:
